name: DevSecOps security checks

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  APP_NAME: gestionale-app

jobs:
  snyk:
    name: SAST and SCA (Snyk)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install application dependencies
        run: python -m pip install -r requirements.txt
      - name: Snyk Open Source - dependency scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=requirements.txt --severity-threshold=high
      - name: Snyk Code - SAST
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: . --severity-threshold=high

  trivy-image:
    name: Container image scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build the image to scan
        run: docker build --tag "${{ env.APP_NAME }}:${{ github.sha }}" .
      - name: Trivy - fail on HIGH and CRITICAL CVEs
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ env.APP_NAME }}:${{ github.sha }}"
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
      - name: Trivy - create SARIF report
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ env.APP_NAME }}:${{ github.sha }}"
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
      - name: Upload Trivy findings to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container

  trivy-repository:
    name: Secrets and IaC scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Find secrets and configuration issues
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret,config
          format: table
          # Report-only in this introductory lab: change to 1 to make it a gate.
          exit-code: "0"

  dast-zap:
    name: DAST on running container (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: trivy-image
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build application image
        run: docker build --tag "${{ env.APP_NAME }}:${{ github.sha }}" .
      - name: Start application container
        run: |
          docker run --detach --rm --name gestionale-dast \
            --publish 8080:8080 \
            --env APP_VERSION="${{ github.sha }}" \
            "${{ env.APP_NAME }}:${{ github.sha }}"
      - name: Wait for the health endpoint
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:8080/api/health; then
              exit 0
            fi
            sleep 2
          done
          echo "The application did not become healthy in time."
          docker logs gestionale-dast
          exit 1
      - name: OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: "http://127.0.0.1:8080"
          allow_issue_writing: false
          fail_action: true
          artifact_name: zap-baseline-report
      - name: Stop application container
        if: always()
        run: docker stop gestionale-dast || true
